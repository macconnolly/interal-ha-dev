              - /tunet-suite/dining-room
              - /tunet-suite/bedroom
            desktop_breakpoint: 1024
            show_settings: false

  # ======================================================================
  # VACUUM LAB (DREAME)
  # ======================================================================
  - type: sections
    title: Vacuum Lab
    path: vacuum-lab
    icon: mdi:robot-vacuum
    max_columns: 12
    sections:
      - type: grid
        column_span: 12
        cards:
          - type: markdown
            content: |
              ## Dusty Operations Lab
              Focused Dreame controls: quick actions, map, maintenance, and tunables.

      - type: grid
        column_span: 4
        cards:
          - type: custom:tunet-status-card
            name: Vacuum Snapshot
            show_header: false
            columns: 2
            tile_size: compact
            tiles:
              - type: value
                entity: sensor.dusty_state
                icon: robot_vacuum
                label: State
                accent: blue
                format: state
              - type: value
                entity: sensor.dusty_battery_level
                icon: battery_6_bar
                label: Battery
                accent: green
                format: integer
                unit: '%'
              - type: value
                entity: sensor.dusty_cleaned_area
                icon: square_foot
                label: Area
                accent: amber
                format: integer
                unit: ft²
              - type: value
                entity: sensor.dusty_cleaning_time
                icon: schedule
                label: Minutes
                accent: muted
                format: integer
                unit: min

      - type: grid
        column_span: 8
        cards:
          - type: grid
            columns: 4
            square: false
            cards:
              - type: button
                name: Start
                icon: mdi:play
                tap_action:
                  action: call-service
                  service: vacuum.start
                  target:
                    entity_id: vacuum.dusty
              - type: button
                name: Pause
                icon: mdi:pause
                tap_action:
                  action: call-service
                  service: vacuum.pause
                  target:
                    entity_id: vacuum.dusty
              - type: button
                name: Stop
                icon: mdi:stop
                tap_action:
                  action: call-service
                  service: vacuum.stop
                  target:
                    entity_id: vacuum.dusty
              - type: button
                name: Dock
                icon: mdi:home-import-outline
                tap_action:
                  action: call-service
                  service: vacuum.return_to_base
                  target:
                    entity_id: vacuum.dusty

          - type: entities
            title: Vacuum Tunables
            entities:
              - entity: vacuum.dusty
              - entity: select.dusty_cleaning_mode
              - entity: select.dusty_suction_level
              - entity: select.dusty_cleaning_route
              - entity: select.dusty_auto_empty_mode
              - entity: select.dusty_drying_time
              - entity: switch.dusty_obstacle_avoidance
              - entity: switch.dusty_carpet_boost
              - entity: switch.dusty_self_clean
              - entity: switch.dusty_auto_drying

      - type: grid
        column_span: 6
        cards:
          - type: picture-entity
            entity: camera.dusty_map
            name: Dusty Live Map
            show_state: false
            camera_view: auto

      - type: grid
        column_span: 6
        cards:
          - type: entities
            title: Maintenance + Consumables
            entities:
              - entity: sensor.dusty_main_brush_left
              - entity: sensor.dusty_side_brush_left
              - entity: sensor.dusty_filter_left
              - entity: sensor.dusty_sensor_dirty_left
              - entity: sensor.dusty_wheel_dirty_left
              - entity: sensor.dusty_error
              - entity: button.dusty_reset_main_brush
              - entity: button.dusty_reset_side_brush
              - entity: button.dusty_reset_filter
              - entity: button.dusty_reset_sensor
              - entity: button.dusty_reset_wheel

      - type: grid
        column_span: 12
        cards:
          - type: custom:tunet-nav-card
            home_path: /tunet-suite/overview
            rooms_path: /tunet-suite/rooms
            media_path: /tunet-suite/media
            subview_paths:
              - /tunet-suite/living-room
              - /tunet-suite/kitchen
              - /tunet-suite/dining-room
              - /tunet-suite/bedroom
            desktop_breakpoint: 1024
            show_settings: false
