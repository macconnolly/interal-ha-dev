  - type: sections
    title: Polish Review
    path: polish-review
    icon: mdi:auto-fix
    max_columns: 4
    dense_section_placement: false
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            content: |
              ## CD11 Visual Polish Review — recipe content + OAL sensor consolidation
              Each variant below uses **only recipe shorthand** with no per-tile overrides, so the
              recipe defaults render exactly as authored. v3.6.0 (X1) collapses three previously-separate
              tiles into one source-of-truth `boost_offset` composite:
              - `boost_offset` is now the **single OAL deviation tile**: value = signed % (e.g. `+21%`),
                label = dominant cause (`Snowy`, `Sunset`, `Manual`, `Movie`, `Paused`, etc.) read from
                `sensor.oal_system_status` attributes. Replaces the prior boost + weather + system trio.
              - `signed_percent` is a self-contained format primitive — no `unit: '%'` needed.
              - `adaptive_count`, `weather_modifier`, `system_state` recipes are **removed** from the
                registry. Authoring `boost_offset` covers all three signals through its composite label.
              - `home_presence` label is **Presence** (compact_label downgrades to **Status** in `room_row`
                where 151px tile clips). State humanizes `not_home` → "Away", `home` → "Home".
              - `mode_ttl` reads `sensor.oal_system_status.attributes.mode_timeout_remaining`.
              - `next_alarm` in `home_summary` uses `time_short_hm` (HH:MM, no seconds).

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Status Summary — recipe-only authoring
            heading_style: subtitle
          - type: custom:tunet-status-card
            name: "Status Summary (Polish)"
            layout_variant: home_summary
            show_header: true
            columns: 4
            tile_size: standard
            use_profiles: true
            recipe_tiles:
              - recipe: home_presence
                entity: person.mac_connolly
              - recipe: lights_on
              - recipe: mode_selector
              - recipe: manual_overrides
                entity: sensor.oal_system_status
              - recipe: inside_temperature
                entity: sensor.dining_room_temperature
                action_entity: climate.dining_room
              - recipe: outside_temperature
