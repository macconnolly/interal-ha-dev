  - title: Sonos Popups
    path: sonos-popups
    icon: mdi:speaker-multiple
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            content: |
              ## Sonos Popups — production architecture

              **Tile flow**: status `now_playing` tile tap → popup A → popup B
              (rich Sonos card). Popup B's back-arrow returns to popup A via
              `show_previous_button: true` and browser hash history.

              **Popup A** (`#sonos-now-playing`) is the quick-control surface.
              Viewport-aware:
              - Mobile (≤ 47.9375em): tunet-media-card *Full + autodiscovery* +
                tunet-speaker-grid-card *Large 3-col Explicit*. The combo gives
                transport, source, per-speaker volume, group toggles, and
                Group All / Ungroup All in one popup without scrolling a
                horizontal speaker list.
              - Desktop (> 47.9375em): custom:sonos-card with sections
                `player, groups, grouping, volumes` (no media browser — that
                lives in popup B).

              **Popup B** (`#sonos-rich`) is the rich Sonos card with all
              sections including `media browser` for picking favorites/queue.

              **Bubble Card 3.2-beta.1 limitation**: the popup `card_type: pop-up`
              does NOT expose a `sub_button:` array — only `show_previous_button`,
              `show_close_button`, and `buttons_position` knobs control the header
              button strip. Verified against the v3.2.0-beta.1 source
              (`src/cards/pop-up/create.js` and `editor.js`). Custom icons in
              the header strip require either a future Bubble Card release or a
              fragile card_mod ::after injection. The "Open Full Player"
              navigation lives at the top of popup A's body, styled to feel
              header-adjacent. Revisit when 3.2 ships stable header sub_button
              support.

      # ─────────────────────────────────────────────────────────────
      # Popup launchers (review entry points)
      # ─────────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Launchers
            heading_style: subtitle
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Open Now Playing (popup A — Compact 2-col)
            icon: mdi:speaker-multiple
            tap_action:
              action: navigate
              navigation_path: '#sonos-now-playing'
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Open Now Playing v2 (popup A — Large 3-col)
            icon: mdi:speaker-multiple-outline
            tap_action:
              action: navigate
              navigation_path: '#sonos-now-playing-v2'
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Open Full Sonos (popup B)
            icon: mdi:music-box-multiple
            tap_action:
              action: navigate
              navigation_path: '#sonos-rich'

      # ─────────────────────────────────────────────────────────────
      # POPUP A — Now Playing (production, viewport-aware)
      # ─────────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: '#sonos-now-playing'
            name: Now Playing
            icon: mdi:speaker-multiple
            popup_mode: adaptive-dialog
            popup_style: bubble
            show_header: true
            show_close_button: true
            buttons_position: right
            # Desktop sizing: the default popup width (~520px) feels cramped for
            # a media card + speaker scroll. Widen via width_desktop and use a
            # slim margin_top_desktop to reclaim vertical space. Mobile sizing is
            # untouched — adaptive-dialog mode keeps the bottom-anchored phone UX.
            width_desktop: 720px
            margin_top_desktop: 4vh
            bg_opacity: 92
            bg_blur: 24
            close_by_clicking_outside: true
            card_mod:
              style: |
                ha-card {
                  --bubble-pop-up-main-background-color: rgba(30, 41, 59, 0.72);
                  --bubble-pop-up-background-color: rgba(30, 41, 59, 0.72);
                  --bubble-backdrop-background-color: rgba(15, 23, 42, 0.65);
                  --bubble-icon-color: var(--blue, #0A84FF);
                  --bubble-accent-color: var(--blue, #0A84FF);
                  backdrop-filter: blur(24px);
                  -webkit-backdrop-filter: blur(24px);
                }
                /* Compress the first card cell inside the popup body. HA core
                   button cards default to grid-row: span 2 (~120px) regardless
                   of grid_options.rows. The Open Full Player button only needs
                   ~50px; without this override the cell reserves 70px+ of
                   phantom space below the button — visible to the user as a
                   gap between the button and the media card. The wrapper div
                   class is .card.fit-rows.full-width; targeting span 1 + auto
                   height collapses the cell to its content height. */
                .bubble-cards-container > .card.fit-rows.full-width:first-child {
                  grid-row: span 1 !important;
                  min-height: 0 !important;
                  height: auto !important;
                }
            cards:
              # Open Full Player — header-adjacent navigation. HA core `type: button`
              # is used here instead of custom:bubble-card because Bubble Card's
              # button card renders the icon as an internal sub_button with its
              # own click handler that doesn't share the rest of the card's tap
              # surface — so only the icon area was firing the navigation in the
              # prior implementation. The HA core button makes the entire ha-card
              # the tap target with one explicit tap_action.
              #
              # grid_options.rows: 1 prevents the button's hui-card host from
              # claiming ~120px of vertical real estate (2 default Sections grid
              # rows) when the actual button content is ~50px tall. Without this
              # the button left a 56-68px phantom gap below itself before the
              # next card — the same gap visible in the user's iOS Companion
              # screenshot.
              - type: button
                name: Open Full Player
                icon: mdi:music-box-multiple
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: '#sonos-rich'
                grid_options:
                  rows: 1
                  columns: full
                card_mod:
                  style: |
                    /* HA core button card defaults to icon-on-top + name-below
                       (vertical flex). For a header-adjacent action button we
                       want a horizontal compact pill: small icon left, label
                       right, single-line height matching the popup header pill.
                       Flipping flex-direction on ha-card directly is the
                       cleanest path because the button's children (ha-ripple,
                       ha-state-icon, span) are direct ha-card descendants. */
                    ha-card {
                      background: rgba(10, 132, 255, 0.06) !important;
                      border: none !important;
                      box-shadow: none !important;
                      flex-direction: row !important;
                      align-items: center !important;
                      justify-content: flex-start !important;
                      gap: 10px !important;
                      padding: 10px 16px !important;
                      min-height: 2.75em !important;
                      height: auto !important;
                      margin-top: -0.25em !important;
                      cursor: pointer !important;
                      --primary-color: var(--blue, #0A84FF);
                      --paper-item-icon-color: var(--blue, #0A84FF);
                    }
                    ha-card:hover {
                      background: rgba(10, 132, 255, 0.10) !important;
                    }
                    ha-state-icon {
                      --mdc-icon-size: 20px !important;
                      color: var(--blue, #0A84FF) !important;
                      flex: 0 0 auto !important;
                    }
                    span {
                      color: var(--blue, #0A84FF) !important;
                      font-weight: 600 !important;
                      font-size: 0.9375em !important;
                      letter-spacing: 0.01em !important;
                      flex: 1 1 auto !important;
                      text-align: left !important;
                    }

              # ONE consistent body at all viewports. The previous viewport-toggle
              # via `card_mod @media + display: none` on two stacked combos was
              # unreliable across HA Companion app rendering contexts: the iOS
              # app left the desktop combo's hui-vertical-stack-card host taking
              # layout space at mobile, creating a phantom 200-400px gap between
              # the Open Full Player button and the actual mobile content. The
              # display:none host was REMOVED from layout in desktop browsers
              # but RESERVED layout space in iOS Companion — a third-party
              # rendering inconsistency we shouldn't depend on.
              #
              # Removing the toggle gives one stable body that works everywhere:
              # tunet-media-card "Full + autodiscovery" + tunet-speaker-grid-card
              # "Compact 2-col (profiles + groups)". Users who want the rich
              # Sonos card with media browser tap "Open Full Player" → popup B.
              # The desktop-only tunet-sonos-card combo survives as a separate
              # preview popup (#sonos-now-playing-v2) for visual comparison.
              - type: custom:tunet-media-card
                entity: media_player.living_room
                name: ''
                coordinator_sensor: sensor.sonos_smart_coordinator
                active_group_sensor: sensor.sonos_active_group_coordinator
                playing_status_sensor: sensor.sonos_playing_status
                show_progress: true
              - type: custom:tunet-speaker-grid-card
                entity: media_player.living_room
                name: ''
                coordinator_sensor: sensor.sonos_smart_coordinator
                columns: 2
                tile_size: compact
                use_profiles: true
                show_group_actions: true
                show_header: false
                icon_tap_action:
                  action: none
                speakers:
                  - entity: media_player.living_room
                    name: Living Room
                    icon: speaker
                  - entity: media_player.dining_room
                    name: Dining Room
                    icon: speaker
                  - entity: media_player.kitchen
                    name: Kitchen
                    icon: speaker
                  - entity: media_player.bedroom
                    name: Bedroom
                    icon: speaker

      # ─────────────────────────────────────────────────────────────
      # POPUP A v2 — Now Playing variant (Large 3-col speaker grid)
      # Preview comparison popup. Uses the alternative speaker grid
      # variant the user discussed (Large 3-col Explicit) so the user
      # can A/B compare against the production popup A. Same media
      # card + same tap action conventions; only the speaker grid
      # tile size + columns differ.
      # ─────────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: '#sonos-now-playing-v2'
            name: Now Playing v2
            icon: mdi:speaker-multiple-outline
            popup_mode: adaptive-dialog
            popup_style: bubble
            show_header: true
            show_close_button: true
            buttons_position: right
            width_desktop: 720px
            margin_top_desktop: 4vh
            bg_opacity: 92
            bg_blur: 24
            close_by_clicking_outside: true
            card_mod:
              style: |
                ha-card {
                  --bubble-pop-up-main-background-color: rgba(30, 41, 59, 0.72);
                  --bubble-pop-up-background-color: rgba(30, 41, 59, 0.72);
                  --bubble-backdrop-background-color: rgba(15, 23, 42, 0.65);
                  --bubble-icon-color: var(--blue, #0A84FF);
                  --bubble-accent-color: var(--blue, #0A84FF);
                  backdrop-filter: blur(24px);
                  -webkit-backdrop-filter: blur(24px);
                }
            cards:
              - type: button
                name: Open Full Player
                icon: mdi:music-box-multiple
                show_state: false
                tap_action:
                  action: navigate
                  navigation_path: '#sonos-rich'
                grid_options:
                  rows: 1
                  columns: full
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(10, 132, 255, 0.06) !important;
                      border: none !important;
                      box-shadow: none !important;
                      flex-direction: row !important;
                      align-items: center !important;
                      justify-content: flex-start !important;
                      gap: 10px !important;
                      padding: 10px 16px !important;
                      min-height: 2.75em !important;
                      height: auto !important;
                      cursor: pointer !important;
                      --primary-color: var(--blue, #0A84FF);
                    }
                    ha-state-icon {
                      --mdc-icon-size: 20px !important;
                      color: var(--blue, #0A84FF) !important;
                      flex: 0 0 auto !important;
                    }
                    span {
                      color: var(--blue, #0A84FF) !important;
                      font-weight: 600 !important;
                      font-size: 0.9375em !important;
                      flex: 1 1 auto !important;
                      text-align: left !important;
                    }
              - type: custom:tunet-media-card
                entity: media_player.living_room
                name: ''
                coordinator_sensor: sensor.sonos_smart_coordinator
                active_group_sensor: sensor.sonos_active_group_coordinator
                playing_status_sensor: sensor.sonos_playing_status
                show_progress: true
              - type: custom:tunet-speaker-grid-card
                entity: media_player.bedroom
                name: ''
                coordinator_sensor: sensor.sonos_smart_coordinator
                columns: 3
                tile_size: large
                use_profiles: true
                show_group_actions: true
                show_header: false
                icon_tap_action:
                  action: none
                speakers:
                  - entity: media_player.living_room
                    name: Living Room
                    icon: speaker
                  - entity: media_player.dining_room
                    name: Dining Room
                    icon: speaker
                  - entity: media_player.kitchen
                    name: Kitchen
                    icon: speaker
                  - entity: media_player.bedroom
                    name: Bedroom
                    icon: speaker
                  - entity: media_player.bath
                    name: Bath
                    icon: speaker

      # ─────────────────────────────────────────────────────────────
      # POPUP B — Sonos rich (full HACS card incl. media browser)
      # ─────────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: '#sonos-rich'
            name: Sonos
            icon: mdi:music-box-multiple
            # popup_mode: centered (Dialog) gives a fixed-dimension popup that
            # doesn't resize between sonos-card sections. Previously this used
            # adaptive-dialog which let the popup shrink for player and grow for
            # favorites — a layout jitter every time the user switched tabs.
            # With centered mode + min-height on the inner card, all sections
            # render in the same vertical footprint (taller sections fill it,
            # shorter ones leave whitespace below — predictable, no jumping).
            popup_mode: centered
            show_header: true
            show_previous_button: true
            show_close_button: true
            width_desktop: 800px
            margin_top_desktop: 3vh
            bg_opacity: 92
            bg_blur: 14
            card_mod:
              style: |
                ha-card {
                  --bubble-pop-up-main-background-color: rgba(30, 41, 59, 0.72);
                  --bubble-icon-color: var(--blue, #0A84FF);
                  --bubble-accent-color: var(--blue, #0A84FF);
                  backdrop-filter: blur(24px);
                  -webkit-backdrop-filter: blur(24px);
                }
            cards:
              - type: custom:sonos-card
                title: ''
                entities:
                  - media_player.living_room
                  - media_player.kitchen
                  - media_player.dining_room
                  - media_player.bedroom
                  - media_player.bath
                showNonSonosPlayers: false
                sections:
                  - player
                  - groups
                  - grouping
                  - volumes
                  - media browser
                startSection: player
                heightPercentage: auto
                widthPercentage: 100
                storePlayerInSessionStorage: true
                dynamicVolumeSlider: true
                player:
                  artworkAsBackground: true
                  artworkAsBackgroundBlur: 12
                  controlsAndHeaderBackgroundOpacity: 0.7
                  showVolumeUpAndDownButtons: true
                grouping:
                  dontSortMembersOnTop: false
                  hideUngroupAllButtons: false
                volumes:
                  hideCogwheel: false
                mediaBrowser:
                  # itemsPerRow: 2 instead of 4 because 4 favorites tiles at the
                  # 720px max-width inner card means ~165px each, which compresses
                  # to ~80px tall narrow strips at mobile (~360px popup width).
                  # 2-per-row gives readable square-ish tiles at both viewports.
                  itemsPerRow: 2
                  favorites:
                    title: Favorites
                    numberToShow: 12
                card_mod:
                  style: |
                    /* Tunet card-primary surface so the embedded HACS sonos-card
                       reads as a peer of every other Tunet card. HA theme tokens
                       make this light/dark adaptive. min-height stabilizes the
                       popup vertical footprint across sonos-card sections — the
                       player section is short, favorites is taller, and the
                       previous adaptive-dialog popup mode caused the whole popup
                       to resize between sections. With min-height on the card
                       AND popup_mode: centered, all sections render in the same
                       vertical box; shorter ones leave whitespace, taller ones
                       fill naturally.

                       Color overrides bind every Material Design / paper-slider
                       token to the Tunet blue accent. Without these the play
                       button and volume slider rendered as raw black blocks at
                       light mode — too much contrast against the soft card
                       surface. Mapping all primary-action colors to the blue
                       accent gives a coherent visual language. */
                    ha-card {
                      background: var(--ha-card-background, var(--card-background-color, rgba(255, 255, 255, 0.92))) !important;
                      backdrop-filter: blur(18px) !important;
                      -webkit-backdrop-filter: blur(18px) !important;
                      border: 1px solid var(--divider-color, rgba(148, 163, 184, 0.18)) !important;
                      border-radius: 18px !important;
                      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.04) !important;
                      max-width: 720px !important;
                      min-height: 600px !important;
                      margin: 0 auto !important;
                      color: var(--primary-text-color) !important;
                      /* Tunet blue across every theme + Material Web Component
                         primitive the Sonos card ultimately reaches for. The
                         play/pause filled button + volume slider thumb were
                         rendering pure black at light mode because the card
                         falls back to --mwc-* (Material Web Components) and
                         --mdc-* (Material Design Components) tokens that are
                         distinct from --primary-color. Binding all four
                         token families to the blue accent gives the soft,
                         theme-coherent rendering the user asked for. */
                      --accent-color: var(--blue, #0A84FF);
                      --primary-color: var(--blue, #0A84FF);
                      --mdc-theme-primary: var(--blue, #0A84FF);
                      --mdc-theme-on-primary: white;
                      --mdc-icon-button-icon-color: var(--blue, #0A84FF);
                      --mwc-icon-button-icon-color: var(--blue, #0A84FF);
                      --mdc-fab-background: var(--blue, #0A84FF);
                      --mdc-button-fill-color: var(--blue, #0A84FF);
                      --paper-slider-knob-color: var(--blue, #0A84FF);
                      --paper-slider-knob-start-color: var(--blue, #0A84FF);
                      --paper-slider-active-color: var(--blue, #0A84FF);
                      --paper-slider-secondary-color: rgba(10, 132, 255, 0.32);
                      --paper-slider-pin-color: var(--blue, #0A84FF);
                      --paper-progress-active-color: var(--blue, #0A84FF);
                      --paper-progress-container-color: rgba(10, 132, 255, 0.16);
                      --switch-checked-color: var(--blue, #0A84FF);
                    }
                    /* Direct CSS overrides for the Sonos card's internal
                       elements that ignore the variables above — fall back to
                       targeting the rendered classes directly. This is fragile
                       (couples to the third-party card's internal class names)
                       but the variables didn't fully reach the play-button and
                       slider thumb. */
                    button.play, button[part="play"], .play-button,
                    mwc-icon-button.play, ha-icon-button.play {
                      color: var(--blue, #0A84FF) !important;
                      background-color: rgba(10, 132, 255, 0.12) !important;
                    }
                    input[type="range"]::-webkit-slider-thumb {
                      background-color: var(--blue, #0A84FF) !important;
                    }
                    input[type="range"]::-moz-range-thumb {
                      background-color: var(--blue, #0A84FF) !important;
                    }
