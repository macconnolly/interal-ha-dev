                lights:
                  - entity: light.kitchen_island_pendants
                    icon: light
                    name: Pendants
                  - entity: light.kitchen_main_lights
                    icon: kitchen
                    name: Main
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-rooms-card
            name: Overview Tiles Compact + explicit actions
            layout_variant: tiles
            tile_size: compact
            use_profiles: true
            rooms:
              - name: Living Room
                icon: weekend
                navigate_path: /tunet-card-rehab-yaml/surfaces
                tap_action:
                  action: navigate
                  navigation_path: /tunet-card-rehab-yaml/surfaces
                hold_action:
                  action: more-info
                  entity: light.living_room_lights
                lights:
                  - entity: light.living_room_couch_lamp
                    icon: table_lamp
