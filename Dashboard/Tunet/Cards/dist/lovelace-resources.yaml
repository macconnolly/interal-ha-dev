    type: js
  - url: /local/tunet/dist/tunet_climate_card.js?v=2.0.0
    type: js
  - url: /local/tunet/dist/tunet_weather_card.js?v=2.0.0
    type: js
  - url: /local/tunet/dist/tunet_media_card.js?v=2.0.0
    type: js
  - url: /local/tunet/dist/tunet_speaker_grid_card.js?v=2.0.0
