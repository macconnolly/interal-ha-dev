# ═══════════════════════════════════════════════════════════════
# Tunet v2 Lovelace Resources
# ═══════════════════════════════════════════════════════════════
# Add these to HA via Settings → Dashboards → Resources
# or in configuration.yaml under lovelace.resources
#
# File location on HA: /config/www/tunet/dist/<filename>.js
# URL path:            /local/tunet/dist/<filename>.js
#
# Cache busting: increment ?v= after each deploy
# ═══════════════════════════════════════════════════════════════

resources:
