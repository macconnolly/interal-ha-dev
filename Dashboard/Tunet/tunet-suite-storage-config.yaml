# Storage dashboard source for `tunet-suite-storage`.
# This mirrors the current Tunet Suite POC so the HA storage dashboard
# can be recreated or updated from repo state.

title: Tunet Suite (Storage POC)
icon: mdi:view-dashboard

views:
  # ======================================================================
  # OVERVIEW
  # ======================================================================
  - type: sections
    title: Overview
    path: overview
    icon: mdi:home
    max_columns: 5
    sections:
      - type: grid
        column_span: 5
        cards:
          - type: custom:tunet-actions-card
            variant: mode_strip
            compact: true
            mode_entity: input_select.oal_active_configuration

      - type: grid
        column_span: 3
        cards:

          - type: custom:tunet-status-card
            name: Home Status
            columns: 4
            tile_size: compact
            tiles:
              - type: value
                entity: sensor.oal_system_status
                icon: sunny
                label: Adaptive
                accent: green
                attribute: zones_adaptive
                format: integer

              - type: value
                entity: sensor.oal_system_status
                icon: front_hand
                label: Manual
                accent: red
                attribute: active_zonal_overrides
                format: integer
                show_when:
                  entity: sensor.oal_system_status
                  operator: not_equals
                  state: Adaptive
                aux_show_when:
                  entity: sensor.oal_global_brightness_offset
                  attribute: total_offset
                  operator: not_equals
                  state: 0
                aux_action:
                  label: Reset
                  icon: restart_alt
                  action: call-service
                  service: script.turn_on
                  service_data:
                    entity_id: script.oal_reset_soft
                tap_action:
                  action: more-info

              - type: value
                entity: sensor.oal_global_brightness_offset
                icon: bolt
                label: Boost
                accent: amber
                attribute: total_offset
                format: integer
                unit: '%'
                secondary:
                  entity: sensor.oal_global_brightness_offset
                  attribute: current_config

              - type: dropdown
                entity: input_select.oal_active_configuration
                icon: tune
                label: Mode
                accent: muted

              - type: value
                entity: weather.home
                icon: partly_cloudy_day
                label: Weather
                accent: blue
                format: state

              - type: value
                entity: sensor.kitchen_humidity
                icon: water_drop
                label: Humidity
                accent: blue
                unit: '%'
                format: integer

              - type: value
                entity: sensor.oal_global_brightness_offset
                icon: schedule
                label: Config
                accent: muted
                attribute: current_config
                format: state

              - type: value
                entity: sensor.dining_room_temperature
                icon: home
                label: Inside
                accent: amber
                unit: °F
                format: integer

      - type: grid
        column_span: 2
        cards:
          - type: custom:tunet-climate-card
            entity: climate.dining_room
            name: Climate

          - type: custom:tunet-weather-card
            entity: weather.home
            name: Environment
            forecast_days: 3
            show_last_updated: false

      - type: grid
        column_span: 5
        cards:
          - type: custom:tunet-lighting-card
            name: Lighting
            surface: section
            layout: grid
            expand_groups: false
            show_adaptive_toggle: false
            tile_size: compact
            columns: 3
            adaptive_entity: switch.adaptive_lighting_main_living
            primary_entity: sensor.oal_system_status
            zones:
              - entity: light.living_room_lights
                name: Living
                icon: lightbulb
              - entity: light.kitchen_island_lights
                name: Kitchen
                icon: kitchen
              - entity: light.bedroom_primary_lights
                name: Bedroom
                icon: bed
              - entity: light.accent_spots_lights
                name: Spots
                icon: highlight
              - entity: light.recessed_ceiling_lights
                name: Ceiling
                icon: light
              - entity: light.column_lights
                name: Columns
                icon: view_column

      - type: grid
        column_span: 3
        cards:
          - type: custom:tunet-rooms-card
            name: Rooms
            rooms:
              - name: Living Room
                icon: weekend
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-suite-storage/living-room
                lights:
                  - entity: light.living_room_couch_lamp
                    icon: table_lamp
                    name: Couch
                  - entity: light.living_room_floor_lamp
                    icon: floor_lamp
                    name: Floor
                  - entity: light.living_room_spot_lights
                    icon: highlight
                    name: Spots
                  - entity: light.living_room_credenza_light
                    icon: light
                    name: Credenza
                  - entity: light.office_desk_lamp
                    icon: desk
                    name: Desk

              - name: Kitchen
                icon: kitchen
                navigate_path: /tunet-suite-storage/kitchen
                lights:
                  - entity: light.kitchen_island_pendants
                    icon: light
                    name: Pendants
                  - entity: light.kitchen_main_lights
                    icon: kitchen
                    name: Main
                  - entity: light.kitchen_counter_cabinet_underlights
                    icon: kitchen
                    name: Under-cab

              - name: Dining Room
                icon: restaurant
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-suite-storage/dining-room
                lights:
                  - entity: light.dining_room_spot_lights
                    icon: highlight
                    name: Spots
                  - entity: light.dining_column_strip_light_matter
                    icon: view_column
                    name: Columns

              - name: Bedroom
                icon: bed
                navigate_path: /tunet-suite-storage/bedroom
                lights:
                  - entity: light.bedroom_primary_lights
                    icon: bed
                    name: Main
                  - entity: light.master_bedroom_corner_accent_govee
                    icon: palette
                    name: Accent
                  - entity: light.master_bedroom_table_lamps
                    icon: table_lamp
                    name: Table Lamps

      - type: grid
        column_span: 2
        cards:
          - type: custom:tunet-media-card
            entity: media_player.living_room
            name: Now Playing
            coordinator_sensor: sensor.sonos_smart_coordinator
            active_group_sensor: sensor.sonos_active_group_coordinator

      - type: grid
        column_span: 5
        cards:
          - type: custom:tunet-nav-card
            home_path: /tunet-suite-storage/overview
            rooms_path: /tunet-suite-storage/rooms
            media_path: /tunet-suite-storage/media
            subview_paths:
              - /tunet-suite-storage/living-room
              - /tunet-suite-storage/kitchen
              - /tunet-suite-storage/dining-room
              - /tunet-suite-storage/bedroom
            desktop_breakpoint: 1024
            show_settings: false

  # ======================================================================
  # ROOMS DIRECTORY
  # ======================================================================
  - type: sections
    title: Rooms
