  - type: sections
    title: Polish Review
    path: polish-review
    icon: mdi:auto-fix
    max_columns: 4
    dense_section_placement: false
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: markdown
            content: |
              ## CD11 Visual Polish Review (Theme A — recipe content + OAL sensor consolidation)
              Each variant below uses **only recipe shorthand** with no per-tile overrides, so the new
              v3.5.0 recipe defaults render exactly as authored. Compare against the existing `/states`
              view (which preserves the prior fixture authoring) to see what Theme A changed:
              - `home_presence` recipe label is now **Presence** (was duplicate "Home")
              - `lights_on` recipe is now self-contained on `sensor.oal_system_status` `lights_on_formatted` ("15/16")
              - `system_state` recipe defaults to **sensor.oal_real_time_monitor** ("Boosted" not "Environmental Boost")
              - `weather_modifier` is a **new recipe** showing active weather modifier % when `weather_modifier_active`
              - `mode_ttl` recipe migrates to `sensor.oal_system_status.attributes.mode_timeout_remaining`
              - `next_alarm` in `home_summary` uses `time_short_hm` (HH:MM, no seconds)

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Status Summary — recipe-only authoring
            heading_style: subtitle
          - type: custom:tunet-status-card
            name: "Status Summary (Polish)"
            layout_variant: home_summary
            show_header: true
            columns: 4
            tile_size: standard
            use_profiles: true
            recipe_tiles:
              - recipe: home_presence
                entity: person.mac_connolly
              - recipe: lights_on
              - recipe: mode_selector
              - recipe: manual_overrides
                entity: sensor.oal_system_status
              - recipe: inside_temperature
                entity: sensor.dining_room_temperature
                action_entity: climate.dining_room
              - recipe: outside_temperature
              - recipe: inside_humidity
                entity: sensor.kitchen_humidity
              - recipe: next_alarm
                entity: sensor.sonos_next_alarm
                compact_label: Bedroom
                navigate_path: /tunet-card-rehab-yaml/alarms
            grid_options:
