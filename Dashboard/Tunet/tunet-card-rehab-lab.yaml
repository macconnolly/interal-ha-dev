# Tunet Card Rehab Lab
#
# Comprehensive YAML dashboard harness for Tunet v3 cards.
#
# Design intent:
# - cover all 13 card families
# - represent meaningful authoring/runtime branches from cards_reference.md
# - include real composition surfaces used by a whole-home dashboard
# - keep a dedicated phone-stress view and a dedicated nav-only view

title: Tunet Card Rehab Lab
icon: mdi:flask

views:
  - type: sections
    title: Card Rehab Lab
    path: lab
    icon: mdi:flask
    max_columns: 4
    dense_section_placement: false
    sections:
      - &rehab_intro type: grid
        column_span: 4
        cards:
          - type: markdown
            content: |
              ## Tunet Card Rehab Lab
              Broad branch coverage for every Tunet card family.
              This view is for config/runtime variants.
              Use `states`, `surfaces`, `phone-stress`, and `nav-lab` for focused review.

      - &rehab_actions type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 1. Actions Card
            heading_style: subtitle
          - type: custom:tunet-actions-card
            name: Compact Services + show_when
            compact: true
            actions:
              - name: All On
                icon: lightbulb
                accent: amber
                service: light.turn_on
                service_data:
                  entity_id:
                    - light.living_room_couch_lamp
                    - light.living_room_floor_lamp
                    - light.living_room_spot_lights
                state_entity: light.living_room_lights
                active_when: "on"
              - name: All Off
                icon: power_settings_new
                accent: amber
                service: light.turn_off
                service_data:
                  entity_id:
                    - light.living_room_couch_lamp
                    - light.living_room_floor_lamp
                    - light.living_room_spot_lights
                state_entity: light.living_room_lights
                active_when: "off"
              - name: Bedtime
                icon: bedtime
                accent: purple
                service: input_select.select_option
                service_data:
                  entity_id: input_select.oal_active_configuration
                  option: Dim Ambient
                state_entity: input_select.oal_active_configuration
                active_when: Dim Ambient
              - name: Reset
                icon: restart_alt
                accent: red
                service: script.turn_on
                service_data:
                  entity_id: script.oal_reset_soft
                show_when:
                  entity: sensor.oal_system_status
                  attribute: active_zonal_overrides
                  operator: gt
                  state: 0
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-actions-card
            name: Relaxed Service Strip
            compact: false
            actions:
              - name: Adaptive
                icon: sunny
                accent: green
                service: input_select.select_option
                service_data:
                  entity_id: input_select.oal_active_configuration
                  option: Adaptive
                state_entity: input_select.oal_active_configuration
                active_when: Adaptive
              - name: TV Mode
                icon: tv
                accent: blue
                service: input_select.select_option
                service_data:
                  entity_id: input_select.oal_active_configuration
                  option: TV Mode
                state_entity: input_select.oal_active_configuration
                active_when: TV Mode
              - name: Sleep
                icon: hotel
                accent: purple
                service: input_select.select_option
                service_data:
                  entity_id: input_select.oal_active_configuration
                  option: Sleep
                state_entity: input_select.oal_active_configuration
                active_when: Sleep
              - name: More Info
                icon: info
                accent: muted
                tap_action:
                  action: more-info
                  entity: sensor.oal_system_status
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-actions-card
            name: Mode Strip
            variant: mode_strip
            compact: true
            mode_entity: input_select.oal_active_configuration
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-actions-card
            name: Tap Action Strip
            compact: true
            actions:
              - name: Status
                icon: info
                accent: blue
                tap_action:
                  action: more-info
                  entity: sensor.oal_system_status
              - name: Overview
                icon: home
                accent: muted
                tap_action:
                  action: navigate
                  navigation_path: /tunet-card-rehab-yaml/surfaces
              - name: Media
                icon: music_note
                accent: blue
                tap_action:
                  action: navigate
                  navigation_path: /tunet-card-rehab-yaml/states
            grid_options:
              columns: 24
              rows: auto

      - &rehab_scenes type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 2. Scenes Card
            heading_style: subtitle
          - type: custom:tunet-scenes-card
            name: Wrap + header + state entity
            show_header: true
            compact: true
            allow_wrap: true
            scenes:
              - entity: scene.all_on_2
                name: All On
                icon: lightbulb
                accent: amber
                state_entity: light.living_room_lights
                active_when: "on"
              - entity: scene.all_off
                name: All Off
                icon: power_settings_new
                accent: amber
              - entity: scene.living_room_dim
                name: Dim
                icon: bedtime
                accent: purple
              - entity: scene.entertain
                name: Entertain
                icon: celebration
                accent: blue
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-scenes-card
            name: Scroll (no header)
            show_header: false
            compact: true
            allow_wrap: false
            scenes:
              - entity: scene.all_on_2
                name: All On
                icon: lightbulb
                accent: amber
              - entity: scene.all_off
                name: All Off
                icon: power_settings_new
                accent: amber
              - entity: scene.living_room_dim
                name: Dim
                icon: bedtime
                accent: purple
              - entity: scene.entertain
                name: Entertain
                icon: celebration
                accent: blue
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-scenes-card
            name: Relaxed Wrap
            show_header: true
            compact: false
            allow_wrap: true
            scenes:
              - entity: scene.all_on_2
                name: All On
                icon: lightbulb
                accent: amber
              - entity: scene.all_off
                name: All Off
                icon: power_settings_new
                accent: amber
              - entity: scene.living_room_dim
                name: Dim
                icon: bedtime
                accent: purple
              - entity: scene.entertain
                name: Entertain
                icon: celebration
                accent: blue
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-scenes-card
            name: Mixed Domains
            show_header: true
            compact: true
            allow_wrap: true
            scenes:
              - entity: scene.all_on_2
                name: Scene
                icon: lightbulb
                accent: amber
              - entity: script.oal_reset_soft
                name: Script
                icon: restart_alt
                accent: red
              - entity: automation.oal_v14_unified_timer_notification
                name: Automation
                icon: schedule
                accent: blue
            grid_options:
              columns: 24
              rows: auto

      - &rehab_lighting type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 3. Lighting Card
            heading_style: subtitle
          - type: custom:tunet-lighting-card
            name: Card Grid Compact (zones + profiles + adaptive)
            surface: card
            layout: grid
            expand_groups: false
            show_adaptive_toggle: true
            tile_size: compact
            use_profiles: true
            columns: 3
            column_breakpoints:
              - max_width: 640
                columns: 2
              - columns: 3
            zones:
              - entity: light.living_room_couch_lamp
                name: Couch
                icon: table_lamp
              - entity: light.living_room_floor_lamp
                name: Floor
                icon: floor_lamp
              - entity: light.living_room_spot_lights
                name: Spots
                icon: highlight
              - entity: light.living_room_credenza_light
                name: Credenza
                icon: light
              - entity: light.office_desk_lamp
                name: Desk
                icon: desk
              - entity: light.column_lights
                name: Columns
                icon: view_column
            show_manual_reset: true
            adaptive_entities:
              - switch.adaptive_lighting_main_living
              - switch.adaptive_lighting_accent_spots
              - switch.adaptive_lighting_column_lights
            primary_entity: sensor.oal_system_status
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-lighting-card
            name: Card Scroll Standard
            surface: card
            layout: scroll
            scroll_rows: 2
            tile_size: standard
            use_profiles: true
            show_adaptive_toggle: false
            expand_groups: false
            zones:
              - entity: light.living_room_lights
                name: Living
                icon: lightbulb
              - entity: light.kitchen_island_lights
                name: Kitchen
                icon: kitchen
              - entity: light.bedroom_primary_lights
                name: Bedroom
                icon: bed
              - entity: light.accent_spots_lights
                name: Spots
                icon: highlight
              - entity: light.recessed_ceiling_lights
                name: Ceiling
                icon: light
              - entity: light.column_lights
                name: Columns
                icon: view_column
            primary_entity: sensor.oal_system_status
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-lighting-card
            name: Section Surface + Expand Groups
            surface: section
            layout: grid
            expand_groups: true
            show_adaptive_toggle: true
            tile_size: compact
            columns: 3
            zones:
              - entity: light.living_room_lights
                name: Living
                icon: lightbulb
              - entity: light.kitchen_island_lights
                name: Kitchen
                icon: kitchen
              - entity: light.bedroom_primary_lights
                name: Bedroom
                icon: bed
            primary_entity: sensor.oal_system_status
            adaptive_entities:
              - switch.adaptive_lighting_main_living
            use_profiles: true
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-lighting-card
            name: Tile Surface Grid Large
            surface: tile
            layout: grid
            expand_groups: false
            show_adaptive_toggle: false
            tile_size: large
            use_profiles: false
            columns: 2
            zones:
              - entity: light.living_room_couch_lamp
                name: Couch
                icon: table_lamp
              - entity: light.living_room_floor_lamp
                name: Floor
                icon: floor_lamp
              - entity: light.living_room_spot_lights
                name: Spots
                icon: highlight
              - entity: light.living_room_credenza_light
                name: Credenza
                icon: light
            primary_entity: sensor.oal_system_status
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-lighting-card
            name: Entities Path + Auto Discovery
            surface: card
            layout: grid
            tile_size: standard
            use_profiles: true
            show_adaptive_toggle: true
            show_manual_reset: true
            entities:
              - light.living_room_lights
              - light.kitchen_island_lights
              - light.bedroom_primary_lights
              - light.column_lights
            primary_entity: sensor.oal_system_status
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-lighting-card
            name: Legacy light_group + overrides
            surface: card
            layout: grid
            tile_size: compact
            use_profiles: false
            show_adaptive_toggle: false
            show_manual_reset: false
            light_group: light.all_lights
            light_overrides:
              light.living_room_couch_lamp:
                name: Couch
                icon: table_lamp
              light.living_room_floor_lamp:
                name: Floor
                icon: floor_lamp
              light.column_lights:
                name: Columns
                icon: view_column
            custom_css: |
              .title { letter-spacing: 0.02em; }
            grid_options:
              columns: 24
              rows: auto

      - &rehab_light_tile type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 4. Light Tile
            heading_style: subtitle
          - type: custom:tunet-light-tile
            entity: light.living_room_couch_lamp
            name: Vert Compact
            variant: vertical
            tile_size: compact
            use_profiles: false
            grid_options:
              columns: 8
              rows: auto
          - type: custom:tunet-light-tile
            entity: light.living_room_floor_lamp
            name: Living Room Floor Lamp Reading Nook
            variant: horizontal
            tile_size: standard
            use_profiles: true
            grid_options:
              columns: 16
              rows: auto
          - type: custom:tunet-light-tile
            entity: light.living_room_spot_lights
            name: Vert Large
            variant: vertical
            tile_size: large
            use_profiles: true
            grid_options:
              columns: 12
              rows: auto
          - type: custom:tunet-light-tile
            entity: light.living_room_credenza_light
            name: Horiz Compact (no profiles)
            variant: horizontal
            tile_size: compact
            use_profiles: false
            grid_options:
              columns: 16
              rows: auto
          - type: custom:tunet-light-tile
            entity: light.living_room_corner_accent
            variant: vertical
            tile_size: standard
            use_profiles: true
            show_manual: true
            grid_options:
              columns: 12
              rows: auto
          - type: custom:tunet-light-tile
            entity: light.kitchen_island_pendants
            name: Kitchen Island Pendant Bar Run
            variant: horizontal
            tile_size: large
            use_profiles: true
            grid_options:
              columns: 16
              rows: auto

      - &rehab_rooms type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 5. Rooms Card
            heading_style: subtitle
          - type: markdown
            content: |
              `tunet-rooms-card` is the room overview / navigation surface.
              Detailed per-room light control belongs on dedicated room surfaces using `tunet-lighting-card`.
              Size coverage here is intentional:
              row = compact / standard / large, tiles = compact / standard / large, slim = compact.
          - type: custom:tunet-rooms-card
            name: Overview Row
            layout_variant: row
            tile_size: standard
            use_profiles: true
            rooms:
              - name: Living Room
                icon: weekend
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-card-rehab-yaml/surfaces
                lights:
                  - entity: light.living_room_couch_lamp
                    icon: table_lamp
                    name: Couch
                  - entity: light.living_room_floor_lamp
                    icon: floor_lamp
                    name: Floor
                  - entity: light.living_room_spot_lights
                    icon: highlight
                    name: Spots
              - name: Kitchen
                icon: kitchen
                humidity_entity: sensor.kitchen_humidity
                navigate_path: /tunet-card-rehab-yaml/surfaces
                lights:
                  - entity: light.kitchen_island_pendants
                    icon: light
                    name: Pendants
                  - entity: light.kitchen_main_lights
                    icon: kitchen
                    name: Main
              - name: Bedroom
                icon: bed
                temperature_entity: sensor.dining_room_temperature
                humidity_entity: sensor.bedroom_temp_humidity_sensor_humidity
                navigate_path: /tunet-card-rehab-yaml/surfaces
                lights:
                  - entity: light.bedroom_primary_lights
                    icon: bed
                    name: Main
                  - entity: light.master_bedroom_corner_accent_govee
                    icon: palette
                    name: Accent
            grid_options:
              columns: 24
              rows: auto
          - type: custom:tunet-rooms-card
            name: Overview Tiles Standard
            layout_variant: tiles
            tile_size: standard
            use_profiles: false
            rooms:
              - name: Living Room
                icon: weekend
                navigate_path: /tunet-card-rehab-yaml/surfaces
                lights:
                  - entity: light.living_room_couch_lamp
                    icon: table_lamp
                  - entity: light.living_room_floor_lamp
                    icon: floor_lamp
              - name: Kitchen
                icon: kitchen
                navigate_path: /tunet-card-rehab-yaml/surfaces
                lights:
                  - entity: light.kitchen_island_pendants
                    icon: light
              - name: Bedroom
                icon: bed
                navigate_path: /tunet-card-rehab-yaml/surfaces
                lights:
                  - entity: light.bedroom_primary_lights
