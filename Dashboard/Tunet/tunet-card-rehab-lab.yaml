              rows: auto
      - &rehab_climate type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 6. Climate Card
            heading_style: subtitle
          - type: custom:tunet-climate-card
            entity: climate.dining_room
            name: Standard + humidity
            humidity_entity: sensor.bedroom_temp_humidity_sensor_humidity
            grid_options:
              columns: 16
              rows: auto
          - type: custom:tunet-climate-card
            entity: climate.dining_room
            name: Standard baseline
            grid_options:
              columns: 16
              rows: auto
          - type: custom:tunet-climate-card
            entity: climate.dining_room
            name: Thin
            variant: thin
            grid_options:
              columns: 16
