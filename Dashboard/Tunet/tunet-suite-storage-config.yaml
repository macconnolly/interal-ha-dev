# Storage dashboard source for `tunet-suite-storage`.
# This mirrors the current Tunet Suite POC so the HA storage dashboard
# can be recreated or updated from repo state.

title: Tunet Suite (Storage POC)
icon: mdi:view-dashboard

views:
  # ======================================================================
  # OVERVIEW
  # ======================================================================
  - type: sections
    title: Overview
    path: overview
    icon: mdi:home
    max_columns: 12
    sections:
      - type: grid
        column_span: 12
        cards:
          - type: custom:tunet-status-card
            name: Quick Chips
            show_header: false
            columns: 6
            column_breakpoints:
              - max_width: 640
                columns: 3
              - max_width: 960
                columns: 4
              - max_width: 1280
                columns: 5
              - columns: 6
            tile_size: compact
            custom_css: |
              .card { padding: 12px 14px; }
              .grid { gap: 8px; }
              .tile {
                border-radius: 999px;
                padding: 10px 9px 7px;
                min-height: 46px;
              }
            tiles:
              - type: value
                entity: person.mac_connolly
                icon: home
                label: Home
                accent: green
                format: state
                dot_rules:
                  - match: Home
                    dot: green
                  - match: "*"
                    dot: red
              - type: value
                entity: sensor.oal_system_status
                icon: front_hand
                label: Manual
                accent: red
                attribute: active_zonal_overrides
                format: integer
              - type: value
                entity: sensor.sun_next_setting
                icon: weather_sunset_down
                label: Sunset
                accent: amber
                format: time
              - type: value
                entity: sensor.dining_room_temperature
                icon: thermostat
                label: Temp
                accent: amber
                unit: °F
                format: integer
              - type: value
                entity: sensor.0x54ef4410016279b4_humidity
                icon: water_drop
                label: Humidity
                accent: blue
                unit: '%'
                format: integer
              - type: value
                entity: sensor.hero_media_state
                icon: speaker
                label: Media
                accent: green
                attribute: room
                format: state
                show_when:
                  entity: sensor.hero_media_state
                  attribute: is_playing
                  operator: equals
                  state: "true"
                tap_action:
                  action: navigate
                  navigation_path: /tunet-suite-storage/media

      - type: grid
        column_span: 12
        cards:
          - type: custom:tunet-actions-card
            variant: mode_strip
            compact: true
            mode_entity: input_select.oal_active_configuration

      - type: grid
        column_span: 12
        cards:
          - type: custom:tunet-scenes-card
            name: Quick Actions
            show_header: false
            compact: true
            allow_wrap: false
            scenes:
              - entity: script.oal_global_manual_brighter
                name: Brighter
                icon: add
                accent: amber
              - entity: script.oal_global_manual_dimmer
                name: Dimmer
                icon: remove
                accent: blue
              - entity: script.oal_reset_soft
                name: Reset
                icon: restart_alt
                accent: red

      - type: grid
        column_span: 7
        cards:

          - type: custom:tunet-status-card
            name: Home Status
            show_header: false
            columns: 8
            column_breakpoints:
              - max_width: 640
                columns: 4
              - max_width: 1024
                columns: 6
              - columns: 8
            tile_size: compact
            tiles:
              - type: value
                entity: sensor.oal_system_status
                icon: sunny
                label: Adaptive
                accent: green
                attribute: zones_adaptive
                format: integer

              - type: value
                entity: sensor.oal_system_status
                icon: front_hand
                label: Manual
                accent: red
                attribute: active_zonal_overrides
                format: integer
                show_when:
                  entity: sensor.oal_system_status
                  operator: not_equals
                  state: Adaptive
                aux_show_when:
                  entity: sensor.oal_system_status
                  attribute: active_zonal_overrides
                  operator: gt
                  state: 0
                aux_action:
                  label: Reset
                  icon: restart_alt
                  action: call-service
                  service: script.turn_on
                  service_data:
                    entity_id: script.oal_reset_soft
                tap_action:
                  action: more-info

              - type: value
                entity: sensor.oal_global_brightness_offset
                icon: bolt
                label: Boost
                accent: amber
                attribute: total_offset
                format: integer
                unit: '%'
                secondary:
                  entity: sensor.oal_global_brightness_offset
                  attribute: current_config

              - type: dropdown
                entity: input_select.oal_active_configuration
                icon: tune
                label: Mode
                accent: muted

              - type: value
                entity: weather.home
                icon: partly_cloudy_day
                label: Weather
                accent: blue
                format: state

              - type: value
                entity: sensor.0x54ef4410016279b4_humidity
                icon: water_drop
                label: Humidity
                accent: blue
                unit: '%'
                format: integer

              - type: value
                entity: sensor.oal_global_brightness_offset
                icon: schedule
                label: Config
                accent: muted
                attribute: current_config
                format: state

              - type: value
                entity: sensor.dining_room_temperature
                icon: home
                label: Inside
                accent: amber
                unit: °F
                format: integer

      - type: grid
        column_span: 5
        cards:
          - type: custom:tunet-climate-card
            entity: climate.dining_room
            name: Climate

          - type: custom:tunet-weather-card
            entity: weather.home
            name: Environment
            forecast_days: 3
            show_last_updated: false

      - type: grid
        column_span: 12
        cards:
          - type: custom:tunet-lighting-card
            name: Lighting
            surface: section
            layout: grid
            expand_groups: false
            show_adaptive_toggle: false
            tile_size: compact
            columns: 4
            column_breakpoints:
              - max_width: 640
                columns: 2
              - max_width: 1024
                columns: 3
              - columns: 4
            primary_entity: sensor.oal_system_status
            zones:
              - entity: light.living_room_lights
                name: Living
                icon: lightbulb
              - entity: light.kitchen_island_lights
                name: Kitchen
                icon: kitchen
              - entity: light.bedroom_primary_lights
                name: Bedroom
                icon: bed
              - entity: light.accent_spots_lights
                name: Spots
                icon: highlight
              - entity: light.recessed_ceiling_lights
                name: Ceiling
                icon: light
              - entity: light.column_lights
                name: Columns
                icon: view_column

      - type: grid
        column_span: 7
        cards:
          - type: custom:tunet-rooms-card
            name: Rooms
            layout_variant: row
            rooms:
              - name: Living Room
                icon: weekend
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-suite-storage/living-room
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: living-room-popup
                lights:
                  - entity: light.living_room_couch_lamp
                    icon: table_lamp
                    name: Couch
                  - entity: light.living_room_floor_lamp
                    icon: floor_lamp
                    name: Floor
                  - entity: light.living_room_spot_lights
                    icon: highlight
                    name: Spots
                  - entity: light.living_room_credenza_light
                    icon: light
                    name: Credenza
                  - entity: light.office_desk_lamp
                    icon: desk
                    name: Desk
                  - entity: light.column_lights
                    icon: view_column
                    name: Columns

              - name: Kitchen
                icon: kitchen
                navigate_path: /tunet-suite-storage/kitchen
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: kitchen-popup
                lights:
                  - entity: light.kitchen_island_pendants
                    icon: light
                    name: Pendants
                  - entity: light.kitchen_main_lights
                    icon: kitchen
                    name: Main
                  - entity: light.kitchen_counter_cabinet_underlights
                    icon: kitchen
                    name: Under-cab

              - name: Dining Room
                icon: restaurant
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-suite-storage/dining-room
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: dining-room-popup
                lights:
                  - entity: light.dining_room_spot_lights
                    icon: highlight
                    name: Spots
                  - entity: light.dining_column_strip_light_matter
                    icon: view_column
                    name: Columns

              - name: Bedroom
                icon: bed
                navigate_path: /tunet-suite-storage/bedroom
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: bedroom-popup
                lights:
                  - entity: light.bedroom_primary_lights
                    icon: bed
                    name: Main
                  - entity: light.master_bedroom_corner_accent_govee
                    icon: palette
                    name: Accent
                  - entity: light.master_bedroom_table_lamps
                    icon: table_lamp
                    name: Table Lamps

      - type: grid
        column_span: 5
        cards:
          - type: custom:tunet-media-card
            entity: media_player.living_room
            name: Now Playing
            coordinator_sensor: sensor.sonos_smart_coordinator
            active_group_sensor: sensor.sonos_active_group_coordinator

      - type: grid
        column_span: 1
        cards:
          - type: custom:popup-card
            popup_card_id: living-room-popup
            popup_card_all_views: true
            title: Living Room
            initial_style: wide
            dismissable: true
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 1fr
                grid-template-rows: min-content
                grid-gap: 8px
              cards:
                - type: custom:tunet-actions-card
                  compact: true
                  actions:
                    - name: Room
                      icon: open_in_new
                      accent: muted
                      tap_action:
                        action: navigate
                        navigation_path: /tunet-suite-storage/living-room
                    - name: Brighter
                      icon: add
                      accent: amber
                      service: script.turn_on
                      service_data:
                        entity_id: script.oal_global_manual_brighter
                    - name: Dimmer
                      icon: remove
                      accent: blue
                      service: script.turn_on
                      service_data:
                        entity_id: script.oal_global_manual_dimmer
                    - name: All On
                      icon: lightbulb
                      accent: amber
                      service: light.turn_on
                      service_data:
                        entity_id:
                          - light.living_room_couch_lamp
                          - light.living_room_floor_lamp
                          - light.living_room_spot_lights
                          - light.living_room_credenza_light
                          - light.office_desk_lamp
                          - light.column_lights
                    - name: All Off
                      icon: power_settings_new
                      accent: amber
                      service: light.turn_off
                      service_data:
                        entity_id:
                          - light.living_room_couch_lamp
                          - light.living_room_floor_lamp
                          - light.living_room_spot_lights
                          - light.living_room_credenza_light
                          - light.office_desk_lamp
                          - light.column_lights
                    - name: Reset
                      icon: restart_alt
                      accent: red
                      service: script.turn_on
                      service_data:
                        entity_id: script.oal_reset_soft
                      show_when:
                        entity: sensor.oal_system_status
                        attribute: active_zonal_overrides
                        operator: gt
                        state: 0
                - type: custom:tunet-lighting-card
                  name: Living Room
                  surface: section
                  layout: grid
                  expand_groups: false
                  show_adaptive_toggle: true
                  show_manual_reset: true
                  adaptive_entities:
                    - switch.adaptive_lighting_main_living
                    - switch.adaptive_lighting_accent_spots
                    - switch.adaptive_lighting_column_lights
                  tile_size: compact
                  columns: 3
                  column_breakpoints:
                    - max_width: 640
                      columns: 2
                    - columns: 3
                  zones:
                    - entity: light.living_room_couch_lamp
                      name: Couch
                      icon: table_lamp
                    - entity: light.living_room_floor_lamp
                      name: Floor
                      icon: floor_lamp
                    - entity: light.living_room_spot_lights
                      name: Spots
                      icon: highlight
                    - entity: light.living_room_credenza_light
                      name: Credenza
                      icon: light
                    - entity: light.office_desk_lamp
                      name: Desk
                      icon: desk
                    - entity: light.column_lights
                      name: Columns
                      icon: view_column
          - type: custom:popup-card
            popup_card_id: kitchen-popup
            popup_card_all_views: true
            title: Kitchen
            initial_style: wide
            dismissable: true
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 1fr
                grid-template-rows: min-content
                grid-gap: 8px
              cards:
                - type: custom:tunet-lighting-card
                  name: Kitchen
                  surface: section
                  layout: grid
                  expand_groups: false
                  show_adaptive_toggle: true
                  show_manual_reset: true
                  adaptive_entities:
                    - switch.adaptive_lighting_kitchen_island
                    - switch.adaptive_lighting_kitchen_undercabinet
                  tile_size: compact
                  columns: 3
                  column_breakpoints:
                    - max_width: 640
                      columns: 2
                    - columns: 3
                  zones:
                    - entity: light.kitchen_island_pendants
                      name: Pendants
                      icon: light
                    - entity: light.kitchen_main_lights
                      name: Main
                      icon: kitchen
                    - entity: light.kitchen_counter_cabinet_underlights
                      name: Under-cab
                      icon: kitchen
          - type: custom:popup-card
            popup_card_id: dining-room-popup
            popup_card_all_views: true
            title: Dining Room
            initial_style: wide
            dismissable: true
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 1fr
                grid-template-rows: min-content
                grid-gap: 8px
              cards:
                - type: custom:tunet-lighting-card
                  name: Dining Room
                  surface: section
                  layout: grid
                  expand_groups: false
                  show_adaptive_toggle: true
                  show_manual_reset: true
                  adaptive_entities:
                    - switch.adaptive_lighting_accent_spots
                    - switch.adaptive_lighting_column_lights
                  tile_size: compact
                  columns: 3
                  column_breakpoints:
                    - max_width: 640
                      columns: 2
                    - columns: 3
                  zones:
                    - entity: light.dining_room_spot_lights
                      name: Spots
                      icon: highlight
                    - entity: light.dining_column_strip_light_matter
                      name: Columns
                      icon: view_column
          - type: custom:popup-card
            popup_card_id: bedroom-popup
            popup_card_all_views: true
            title: Bedroom
            initial_style: wide
            dismissable: true
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 1fr
                grid-template-rows: min-content
                grid-gap: 8px
              cards:
                - type: custom:tunet-lighting-card
                  name: Bedroom
                  surface: section
                  layout: grid
                  expand_groups: false
                  show_adaptive_toggle: true
                  show_manual_reset: true
                  adaptive_entities:
                    - switch.adaptive_lighting_bedroom_primary
                  tile_size: compact
                  columns: 3
                  column_breakpoints:
                    - max_width: 640
                      columns: 2
                    - columns: 3
                  zones:
                    - entity: light.bedroom_primary_lights
                      name: Main
                      icon: bed
                    - entity: light.master_bedroom_corner_accent_govee
                      name: Accent
                      icon: palette
                    - entity: light.master_bedroom_table_lamps
                      name: Table Lamps
                      icon: table_lamp

      - type: grid
        column_span: 12
        cards:
          - type: custom:tunet-nav-card
            home_path: /tunet-suite-storage/overview
            rooms_path: /tunet-suite-storage/rooms
            media_path: /tunet-suite-storage/media
            subview_paths:
              - /tunet-suite-storage/living-room
              - /tunet-suite-storage/kitchen
              - /tunet-suite-storage/dining-room
              - /tunet-suite-storage/bedroom
            desktop_breakpoint: 1024
            show_settings: false

  # ======================================================================
  # ROOMS DIRECTORY
  # ======================================================================
  - type: sections
    title: Rooms
    path: rooms
    icon: mdi:floor-plan
    max_columns: 12
    sections:
      - type: grid
        cards:
          - type: custom:tunet-rooms-card
            name: Rooms
            layout_variant: row
            rooms:
              - name: Living Room
                icon: weekend
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-suite-storage/living-room
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: living-room-popup
                lights:
                  - entity: light.living_room_couch_lamp
                    icon: table_lamp
                    name: Couch
                  - entity: light.living_room_floor_lamp
                    icon: floor_lamp
                    name: Floor
                  - entity: light.living_room_spot_lights
                    icon: highlight
                    name: Spots
                  - entity: light.living_room_credenza_light
                    icon: light
                    name: Credenza
                  - entity: light.office_desk_lamp
                    icon: desk
                    name: Desk
                  - entity: light.column_lights
                    icon: view_column
                    name: Columns

              - name: Kitchen
                icon: kitchen
                navigate_path: /tunet-suite-storage/kitchen
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: kitchen-popup
                lights:
                  - entity: light.kitchen_island_pendants
                    icon: light
                    name: Pendants
                  - entity: light.kitchen_main_lights
                    icon: kitchen
                    name: Main
                  - entity: light.kitchen_counter_cabinet_underlights
                    icon: kitchen
                    name: Under-cab

              - name: Dining Room
                icon: restaurant
                temperature_entity: sensor.dining_room_temperature
                navigate_path: /tunet-suite-storage/dining-room
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: dining-room-popup
                lights:
                  - entity: light.dining_room_spot_lights
                    icon: highlight
                    name: Spots
                  - entity: light.dining_column_strip_light_matter
                    icon: view_column
                    name: Columns

              - name: Bedroom
                icon: bed
                navigate_path: /tunet-suite-storage/bedroom
                hold_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: bedroom-popup
                lights:
                  - entity: light.bedroom_primary_lights
                    icon: bed
                    name: Main
                  - entity: light.master_bedroom_corner_accent_govee
                    icon: palette
                    name: Accent
                  - entity: light.master_bedroom_table_lamps
                    icon: table_lamp
                    name: Table Lamps

          - type: custom:tunet-nav-card
            home_path: /tunet-suite-storage/overview
            rooms_path: /tunet-suite-storage/rooms
            media_path: /tunet-suite-storage/media
            subview_paths:
              - /tunet-suite-storage/living-room
              - /tunet-suite-storage/kitchen
              - /tunet-suite-storage/dining-room
              - /tunet-suite-storage/bedroom
            desktop_breakpoint: 1024
            show_settings: false

  # ======================================================================
  # MEDIA
  # ======================================================================
  - type: sections
    title: Media
    path: media
    icon: mdi:speaker
    max_columns: 12
    sections:
      - type: grid
        cards:
          - type: custom:tunet-speaker-grid-card
            entity: media_player.living_room
            name: Speakers
            coordinator_sensor: sensor.sonos_smart_coordinator
            columns: 4
            tile_size: standard
            show_group_actions: true
            speakers:
              - entity: media_player.living_room
                name: Living Room
                icon: speaker
              - entity: media_player.dining_room
                name: Dining Room
                icon: speaker
              - entity: media_player.kitchen
                name: Kitchen
                icon: speaker
              - entity: media_player.bath
                name: Bathroom
                icon: speaker
              - entity: media_player.bedroom
                name: Bedroom
                icon: speaker

          - type: custom:tunet-media-card
            entity: media_player.living_room
            name: Now Playing
            coordinator_sensor: sensor.sonos_smart_coordinator
            active_group_sensor: sensor.sonos_active_group_coordinator

          - type: custom:tunet-nav-card
            home_path: /tunet-suite-storage/overview
            rooms_path: /tunet-suite-storage/rooms
            media_path: /tunet-suite-storage/media
            subview_paths:
              - /tunet-suite-storage/living-room
              - /tunet-suite-storage/kitchen
              - /tunet-suite-storage/dining-room
              - /tunet-suite-storage/bedroom
            desktop_breakpoint: 1024
            show_settings: false

  # ======================================================================
  # SUBVIEWS (ROOM DETAIL)
  # ======================================================================
  - type: sections
    title: Living Room
    path: living-room
    icon: mdi:sofa
    subview: true
    back_path: /tunet-suite-storage/overview
    max_columns: 12
    sections:
      - type: grid
        cards:
          - type: custom:tunet-actions-card
            compact: true
            actions:
              - name: All On
                icon: lightbulb
                accent: amber
                service: light.turn_on
                service_data:
                  entity_id:
                    - light.living_room_couch_lamp
                    - light.living_room_floor_lamp
                    - light.living_room_spot_lights
                    - light.living_room_credenza_light
                    - light.office_desk_lamp
                    - light.column_lights
              - name: All Off
                icon: power_settings_new
                accent: amber
                service: light.turn_off
                service_data:
                  entity_id:
                    - light.living_room_couch_lamp
                    - light.living_room_floor_lamp
                    - light.living_room_spot_lights
                    - light.living_room_credenza_light
                    - light.office_desk_lamp
                    - light.column_lights
              - name: Reset
                icon: restart_alt
                accent: red
                service: script.turn_on
                service_data:
                  entity_id: script.oal_reset_soft

          - type: custom:tunet-scenes-card
            name: Living Quick
            show_header: false
            compact: true
            scenes:
              - entity: script.oal_global_manual_brighter
                name: Brighter
                icon: add
                accent: amber
              - entity: script.oal_global_manual_dimmer
                name: Dimmer
                icon: remove
                accent: blue
              - entity: script.oal_reset_soft
                name: Reset
                icon: restart_alt
                accent: red

          - type: custom:tunet-lighting-card
            name: Living Room
            surface: section
            layout: grid
            expand_groups: false
            show_adaptive_toggle: true
            tile_size: compact
            columns: 3
            column_breakpoints:
              - max_width: 640
                columns: 2
              - columns: 3
            zones:
              - entity: light.living_room_couch_lamp
                name: Couch
                icon: table_lamp
              - entity: light.living_room_floor_lamp
                name: Floor
                icon: floor_lamp
              - entity: light.living_room_spot_lights
                name: Spots
                icon: highlight
              - entity: light.living_room_credenza_light
                name: Credenza
                icon: light
              - entity: light.office_desk_lamp
                name: Desk
                icon: desk
              - entity: light.column_lights
                name: Columns
                icon: view_column

          - type: custom:tunet-media-card
            entity: media_player.living_room
            name: Sonos
            coordinator_sensor: sensor.sonos_smart_coordinator
            active_group_sensor: sensor.sonos_active_group_coordinator

          - type: custom:tunet-nav-card
            home_path: /tunet-suite-storage/overview
            rooms_path: /tunet-suite-storage/rooms
            media_path: /tunet-suite-storage/media
            subview_paths:
              - /tunet-suite-storage/living-room
              - /tunet-suite-storage/kitchen
              - /tunet-suite-storage/dining-room
              - /tunet-suite-storage/bedroom
            desktop_breakpoint: 1024
            show_settings: false

  - type: sections
    title: Kitchen
    path: kitchen
    icon: mdi:countertop
    subview: true
    back_path: /tunet-suite-storage/overview
